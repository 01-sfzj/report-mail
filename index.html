<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>线索举报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.08);
            overflow: hidden;
            text-align: center;
            padding: 32px 24px 40px;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2d3d;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 16px;
            margin: 24px 0;
            text-align: left;
            border: 1px solid #e9ecef;
        }
        .info-item {
            margin-bottom: 12px;
            font-size: 15px;
            word-break: break-all;
        }
        .info-label {
            font-weight: 600;
            color: #4a5568;
            display: inline-block;
            width: 60px;
        }
        .info-value {
            color: #1a2634;
            font-family: monospace;
        }
        button {
            background: #0066cc;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active {
            background: #0052a3;
            transform: scale(0.98);
        }
        .tip {
            font-size: 13px;
            color: #6c757d;
            margin-top: 24px;
            line-height: 1.4;
        }
        .manual-link {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        hr {
            margin: 20px 0 12px;
            border: none;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📧</div>
    <h1>线索举报</h1>
    <p style="color:#4a5568; margin-bottom: 8px;">点击下方按钮，自动打开邮件客户端</p>

    <div class="info-box">
        <div class="info-item">
            <span class="info-label">收件人：</span>
            <span class="info-value">651578199@qq.com</span>
        </div>
        <div class="info-item">
            <span class="info-label">主　题：</span>
            <span class="info-value">线索举报</span>
        </div>
        <div class="info-item">
            <span class="info-label">说　明：</span>
            <span class="info-value">邮件正文可自由填写线索内容</span>
        </div>
    </div>

    <button id="mailBtn">
        ✉️ 打开邮件客户端
    </button>

    <div class="tip">
        ⚠️ 如果点击后无反应，说明手机未安装邮件App。<br>
        请复制收件人地址 <strong>651578199@qq.com</strong>，手动打开邮箱发送。
    </div>
</div>

<script>
    // 预定义的 mailto 链接（收件人 + 主题）
    const mailtoLink = 'mailto:651578199@qq.com?subject=线索举报';

    // 页面加载后自动尝试唤起邮件（延迟300ms，避免被微信完全拦截）
    window.addEventListener('load', function() {
        setTimeout(function() {
            window.location.href = mailtoLink;
        }, 300);
    });

    // 按钮点击事件（确保用户主动操作可唤起）
    document.getElementById('mailBtn').addEventListener('click', function() {
        window.location.href = mailtoLink;
    });
</script>
</body>
</html>
