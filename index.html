<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>线索举报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.08);
            padding: 32px 24px 40px;
            text-align: center;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2d3d;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 16px;
            margin: 24px 0;
            text-align: left;
            border: 1px solid #e9ecef;
        }
        .info-item {
            margin-bottom: 12px;
            font-size: 15px;
            word-break: break-all;
        }
        .info-label {
            font-weight: 600;
            color: #4a5568;
            display: inline-block;
            width: 70px;
        }
        .info-value {
            color: #1a2634;
            font-family: monospace;
        }
        button {
            background: #0066cc;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 500;
            padding: 14px 20px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active {
            background: #0052a3;
            transform: scale(0.98);
        }
        .copy-btn {
            background: #28a745;
        }
        .copy-btn:active {
            background: #1e7e34;
        }
        .qq-btn {
            background: #12b7f5;
        }
        .qq-btn:active {
            background: #0e9ad4;
        }
        .tip {
            font-size: 13px;
            color: #6c757d;
            margin-top: 20px;
            line-height: 1.4;
        }
        .toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 8px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📧</div>
    <h1>线索举报</h1>
    <p style="color:#4a5568; margin-bottom: 8px;">请通过邮件发送线索</p>

    <div class="info-box">
        <div class="info-item">
            <span class="info-label">收件人：</span>
            <span class="info-value" id="emailAddress">651578199@qq.com</span>
        </div>
        <div class="info-item">
            <span class="info-label">主　题：</span>
            <span class="info-value">线索举报</span>
        </div>
        <div class="info-item">
            <span class="info-label">说　明：</span>
            <span class="info-value">邮件正文请详细描述线索</span>
        </div>
    </div>

    <button id="mailBtn">
        ✉️ 使用默认邮件客户端发送
    </button>
    <button id="qqMailBtn" class="qq-btn">
        💬 直接使用 QQ 邮箱发送
    </button>
    <button id="copyBtn" class="copy-btn">
        📋 复制收件人地址
    </button>

    <div class="tip">
        ✅ 点击“默认邮件客户端”会弹出选择，可选择 QQ 邮箱等。<br>
        📱 如无法跳转，请复制地址后手动打开 QQ 邮箱粘贴。
    </div>
</div>

<div id="toast" class="toast">已复制，请打开QQ邮箱粘贴收件人</div>

<script>
    const email = '651578199@qq.com';
    const subject = '线索举报';
    const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
    // 直接唤起 QQ 邮箱的协议（Android/iOS 均支持，需安装 QQ 邮箱 App）
    const qqMailLink = `mqq://mail/compose?to=${email}&subject=${encodeURIComponent(subject)}`;

    // 显示提示浮层
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg || '已复制，请打开QQ邮箱粘贴收件人';
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // 默认邮件客户端按钮
    document.getElementById('mailBtn').addEventListener('click', function() {
        window.location.href = mailtoLink;
    });

    // 直接唤起 QQ 邮箱按钮（仅限已安装 QQ 邮箱 App 的用户）
    document.getElementById('qqMailBtn').addEventListener('click', function() {
        window.location.href = qqMailLink;
        // 如果无法唤起，3秒后提示兜底
        setTimeout(() => {
            showToast('如果未打开QQ邮箱，请手动复制地址');
        }, 1000);
    });

    // 复制邮箱地址
    document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(email).then(() => {
            showToast('已复制收件人地址：' + email);
        }).catch(() => {
            // 降级方案
            const textarea = document.createElement('textarea');
            textarea.value = email;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('已复制收件人地址：' + email);
        });
    });
</script>
</body>
</html>
